server.port=${PORT:8081}
logging.level.org.atmosphere=warn

# H2 persistente en archivo (usuarios y datos de la app) para no perderse al reiniciar
spring.datasource.url=jdbc:h2:file:./data/lineabase;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver

# Carpeta externa (fuera del .jar) donde viven plc-config.json y linea-id-config.json.
# Es la misma carpeta C:\LineaBaseX donde ya se guardan las bases SQLite (BASE_PATH en
# DatabaseInitializationService) y la base H2 (./data, que en el servidor corre desde ahi).
# Se siembra automaticamente en el primer arranque con los JSON incluidos en resources.
app.config.dir=C:\\LineaBaseX\\config

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.example

# Let Hibernate update the schema automatically or create it if it does not exist.
#
# DO NOT DO THIS IN PRODUCTION!
#
# Instead, use Flyway or another controlled way of managing your database schema.
# See https://vaadin.com/docs/latest/building-apps/forms-data/add-flyway for instructions.
spring.jpa.hibernate.ddl-auto=update
logging.level.com.example.dataacquisition=DEBUG
vaadin.productionMode=true